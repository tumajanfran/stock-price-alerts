name: Check stock alerts

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'alerts.json'

permissions:
  contents: write

concurrency:
  group: stock-alerts
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check prices
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python check_alerts.py

      - name: Commit triggered state if changed
        run: |
          if ! git diff --quiet alerts.json; then
            git config user.name  "stock-alerts-bot"
            git config user.email "actions@users.noreply.github.com"
            git add alerts.json
            git commit -m "Update alert triggered state"
            git push
          fi
